<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe0ef,#fff5fa);
    padding:20px;
}

.card{
    background:white;
    width:100%;
    max-width:800px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
}

h1{
    color:#222;
    margin-bottom:20px;
    font-size:2rem;
}

.subtitle{
    color:#666;
    margin-bottom:35px;
    line-height:1.6;
}

.buttons{
    position:relative;
    height:120px;
    margin-top:30px;
}

button{
    border:none;
    cursor:pointer;
    border-radius:999px;
    padding:15px 35px;
    font-size:1.1rem;
    transition:.3s;
}

.yes{
    background:#ff1493;
    color:white;
}

.yes:hover{
    transform:scale(1.05);
}

.no{
    background:#e5e5e5;
    color:#333;
    position:relative;
}

.hidden{
    display:none;
}

#success{
    margin-top:30px;
}

#success h2{
    color:#ff1493;
    margin-bottom:20px;
}

.gif{
    border-radius:15px;
    max-width:280px;
    width:100%;
}

.activity-container{
    margin-top:30px;
}

.activity-btn{
    background:#ff1493;
    color:white;
    margin:10px;
    min-width:180px;
}

.activity-btn:hover{
    transform:scale(1.05);
}

#finalMessage{
    margin-top:30px;
    padding:20px;
    border-radius:15px;
    background:#fff0f7;
    color:#333;
    font-size:1.2rem;
}
</style>
</head>

<body>

<div class="card">

    <h1>Mais du coup pour le date j'ai pas compris c'est oui ou bien c'est non ? </h1>

    <p class="subtitle">
        t'as le choix 
        <br><br>
        🥾 Randonnée • 🎬 Cinéma
    </p>

    <div class="buttons">

        <button id="yesBtn" class="yes">
            OUI
        </button>

        <button id="noBtn" class="no">
            NON
        </button>

    </div>

    <div id="success" class="hidden">

        <h2>Ben voyons, j'me doutais bien que t'accepterais </h2>

        <img
        class="gif"
        src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExeTU3N2MwcmdocW4zaWV4bmt6cGcwb3cxNzNpeWk4M3d1YXhlZ21vZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/A97zAYwKXnTQ2BTmxz/giphy.gif"
        alt="gif">

        <div class="activity-container">

            <h3>T'as le choix entre deux trucs chouchou</h3>

            <button
                class="activity-btn"
                onclick="chooseActivity('Cinéma')">
                🎬 Cinéma
            </button>

            <button
                class="activity-btn"
                onclick="chooseActivity('Randonnée')">
                🥾 Randonnée
            </button>

        </div>

        <div id="finalMessage" class="hidden"></div>

    </div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let scale = 1;

noBtn.addEventListener("mouseenter", () => {

    const x = (Math.random() * 400) - 200;
    const y = (Math.random() * 200) - 100;

    noBtn.style.transform =
        `translate(${x}px, ${y}px)`;

    scale += 0.15;

    yesBtn.style.transform =
        `scale(${scale})`;
});

yesBtn.addEventListener("click", () => {

    yesBtn.style.display = "none";
    noBtn.style.display = "none";

    document
        .getElementById("success")
        .classList
        .remove("hidden");
});

function chooseActivity(activity){

    const finalMessage =
        document.getElementById("finalMessage");

    finalMessage.classList.remove("hidden");

    finalMessage.innerHTML = `
        Jmen doutais un peu en vrai
        <br><br>
        bon bah vsy du coup 
        <strong>${activity}</strong> , a bienôt la croqueuse
        <br><br>
    
    `;

   

    fetch("https://discord.com/api/webhooks/1511736010319597629/NeFKMuHlr-rC9GJueoKmEjcvH0fdyjuGD6mQ6GN1pl6nKKi--yMwN53Q5K0mFg3iuWBc",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            content:` Elle a choisi : ${activity}`
        })
    }).catch(console.error);

}
</script>

</body>
</html>
